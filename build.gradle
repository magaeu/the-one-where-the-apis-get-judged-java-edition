plugins {
    id 'java'
}

group = 'com.restfulbooker.api'
version = '1.0-SNAPSHOT'

ext {
    assertJVersion = "3.27.1"
    restAssuredVersion = "5.5.6"
    junitVersion = "6.0.1"
    junitDataProviderVersion = "2.12"
    lombokVersion = "1.18.42"
    jacksonVersion = "3.1.0"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation(
            "io.rest-assured:rest-assured:${restAssuredVersion}",
            "io.rest-assured:json-schema-validator:${restAssuredVersion}",
            "org.junit.jupiter:junit-jupiter-api:${junitVersion}",
            "org.junit.jupiter:junit-jupiter-engine:${junitVersion}",
            "org.junit.jupiter:junit-jupiter-params:${junitVersion}",
            "org.assertj:assertj-core:${assertJVersion}",
            "org.projectlombok:lombok:${lombokVersion}",
            "tools.jackson.core:jackson-core:${jacksonVersion}",
            "com.tngtech.junit.dataprovider:junit4-dataprovider:${junitDataProviderVersion}"
    )
    testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"
}

testing {
    suites {
        test {
            useJUnitJupiter("${junitVersion}")
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
